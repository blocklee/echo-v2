<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECHO 模拟器控制台 · 本地版</title>
<style>
:root {
  --paper: #f5f3ef;
  --ink-dark: #2c3e3a;
  --ink-medium: #4A7C6F;
  --ink-light: #7a8b82;
  --vermilion: #c44536;
  --gold: #c4a35a;
  --border: #e5e1da;
  --success: #27ae60;
  --warning: #f39c12;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--paper);
  color: var(--ink-dark);
  line-height: 1.6;
  min-height: 100vh;
}
.header {
  background: linear-gradient(135deg, var(--ink-dark) 0%, var(--ink-medium) 100%);
  color: white;
  padding: 30px 40px;
  text-align: center;
}
.header h1 { font-size: 28px; margin-bottom: 8px; font-weight: 400; letter-spacing: 0.1em; }
.header .subtitle { opacity: 0.8; font-size: 14px; }
.status-bar {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 12px;
  background: white;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.status-item { display: flex; align-items: center; gap: 6px; }
.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--warning);
  animation: pulse 2s infinite;
}
.status-dot.connected { background: var(--success); animation: none; }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 30px 20px;
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: 24px;
}
@media (max-width: 900px) {
  .container { grid-template-columns: 1fr; }
}
.sidebar {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.card {
  background: white;
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  border: 1px solid var(--border);
}
.card-title {
  font-size: 16px;
  color: var(--ink-medium);
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--border);
  font-weight: 500;
}
.form-group { margin-bottom: 14px; }
.form-group label {
  display: block;
  font-size: 13px;
  color: var(--ink-light);
  margin-bottom: 6px;
}
.form-group input, .form-group select {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 14px;
  background: var(--paper);
  color: var(--ink-dark);
}
.form-group input:focus, .form-group select:focus {
  outline: none;
  border-color: var(--ink-medium);
}
.btn {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
  font-weight: 500;
}
.btn-primary {
  background: var(--ink-medium);
  color: white;
}
.btn-primary:hover { background: var(--ink-dark); }
.btn-secondary {
  background: var(--gold);
  color: var(--ink-dark);
}
.btn-secondary:hover { background: #b08d4b; }
.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.main-panel {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.result-area {
  min-height: 200px;
  max-height: 600px;
  overflow-y: auto;
}
.result-empty {
  text-align: center;
  color: var(--ink-light);
  padding: 60px 20px;
}
.result-empty .icon { font-size: 48px; margin-bottom: 16px; }
.metrics-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  margin-bottom: 16px;
}
.metric-card {
  background: linear-gradient(135deg, var(--ink-medium) 0%, var(--ink-dark) 100%);
  color: white;
  padding: 16px;
  border-radius: 8px;
  text-align: center;
}
.metric-value {
  font-size: 24px;
  font-weight: 600;
  margin-bottom: 4px;
}
.metric-label {
  font-size: 12px;
  opacity: 0.8;
}
.json-viewer {
  background: #2c3e3a;
  color: #f5f3ef;
  padding: 16px;
  border-radius: 8px;
  font-family: "Consolas", "Monaco", monospace;
  font-size: 13px;
  line-height: 1.6;
  overflow-x: auto;
  white-space: pre-wrap;
  word-break: break-all;
}
.json-key { color: #c4a35a; }
.json-string { color: #a8d5ba; }
.json-number { color: #e8b87d; }
.json-bool { color: #ff9999; }
.loading {
  text-align: center;
  padding: 40px;
  color: var(--ink-light);
}
.loading-spinner {
  display: inline-block;
  width: 24px;
  height: 24px;
  border: 2px solid var(--border);
  border-top-color: var(--ink-medium);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-right: 8px;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error-box {
  background: #fdeaea;
  color: var(--vermilion);
  padding: 12px 16px;
  border-radius: 6px;
  font-size: 13px;
  margin-bottom: 12px;
}
.success-box {
  background: #e8f5e9;
  color: var(--success);
  padding: 12px 16px;
  border-radius: 6px;
  font-size: 13px;
  margin-bottom: 12px;
}
.endpoint-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 16px;
}
.endpoint-tab {
  padding: 8px 16px;
  border: 1px solid var(--border);
  background: white;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s;
}
.endpoint-tab.active {
  background: var(--ink-medium);
  color: white;
  border-color: var(--ink-medium);
}
.endpoint-tab:hover:not(.active) {
  background: var(--paper);
}
.tab-content { display: none; }
.tab-content.active { display: block; }

.creator-list, .user-list {
  max-height: 200px;
  overflow-y: auto;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px;
  background: var(--paper);
}
.creator-item, .user-item {
  display: flex;
  justify-content: space-between;
  padding: 6px 8px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.creator-item:last-child, .user-item:last-child { border-bottom: none; }
.rank-1 { color: var(--gold); font-weight: bold; }
.rank-2 { color: var(--ink-medium); font-weight: bold; }
.rank-3 { color: var(--vermilion); font-weight: bold; }
</style>
</head>
<body>
<div class="header">
  <h1>🌱 ECHO 模拟器控制台</h1>
  <div class="subtitle">本地后端连接版 · v4.0 · 双击打开即用</div>
</div>

<div class="status-bar">
  <div class="status-item">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">检测后端连接...</span>
  </div>
  <div class="status-item">
    后端地址: <code>http://localhost:8000</code>
  </div>
  <div class="status-item">
    引擎: <span id="engineVersion">-</span>
  </div>
</div>

<div class="container">
  <div class="sidebar">
    <div class="card">
      <div class="card-title">⚙️ 模拟参数</div>
      <div class="form-group">
        <label>模拟天数</label>
        <input type="number" id="durationDays" value="10" min="1" max="365">
      </div>
      <div class="form-group">
        <label>创作者数量</label>
        <input type="number" id="numCreators" value="4" min="1" max="100">
      </div>
      <div class="form-group">
        <label>用户数量</label>
        <input type="number" id="numUsers" value="10" min="1" max="500">
      </div>
      <div class="form-group">
        <label>平台抽成 (%)</label>
        <input type="number" id="platformFee" value="5" min="0" max="100">
      </div>
    </div>

    <div class="card">
      <div class="card-title">🎯 选择实验</div>
      <div class="endpoint-tabs">
        <div class="endpoint-tab active" onclick="switchTab('single')">单次</div>
        <div class="endpoint-tab" onclick="switchTab('tournament')">锦标赛</div>
        <div class="endpoint-tab" onclick="switchTab('ab')">A/B</div>
      </div>

      <div id="tab-single" class="tab-content active">
        <button class="btn btn-primary" id="btnSingle" onclick="runSingle()">
          🚀 运行单次模拟
        </button>
      </div>

      <div id="tab-tournament" class="tab-content">
        <div class="form-group">
          <label>策略对比（多选）</label>
          <select id="strategies" multiple size="4" style="height: auto;">
            <option value="保守型" selected>保守型</option>
            <option value="开放型" selected>开放型</option>
            <option value="平衡型">平衡型</option>
            <option value="策略型">策略型</option>
          </select>
        </div>
        <div class="form-group">
          <label>轮次（越多越准但越慢）</label>
          <input type="number" id="nRounds" value="5" min="1" max="50">
        </div>
        <button class="btn btn-secondary" id="btnTournament" onclick="runTournament()">
          🏆 运行锦标赛
        </button>
      </div>

      <div id="tab-ab" class="tab-content">
        <div class="form-group">
          <label>轮次</label>
          <input type="number" id="nRoundsAB" value="5" min="1" max="50">
        </div>
        <button class="btn btn-secondary" id="btnAB" onclick="runAB()">
          ⚖️ 运行 A/B 实验
        </button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">📊 快速指标</div>
      <div class="metrics-grid" id="quickMetrics">
        <div class="metric-card">
          <div class="metric-value" id="qEvents">-</div>
          <div class="metric-label">总事件</div>
        </div>
        <div class="metric-card">
          <div class="metric-value" id="qRevenue">-</div>
          <div class="metric-label">总收入</div>
        </div>
        <div class="metric-card">
          <div class="metric-value" id="qSatisfaction">-</div>
          <div class="metric-label">满意度</div>
        </div>
        <div class="metric-card">
          <div class="metric-value" id="qHealth">-</div>
          <div class="metric-label">生态健康</div>
        </div>
      </div>
    </div>
  </div>

  <div class="main-panel">
    <div class="card" id="resultCard" style="display: none;">
      <div class="card-title">📋 实验结果</div>
      <div id="resultContent"></div>
    </div>

    <div class="card" id="emptyCard">
      <div class="result-area">
        <div class="result-empty">
          <div class="icon">🔮</div>
          <div>点击左侧按钮运行实验</div>
          <div style="font-size: 13px; margin-top: 8px; opacity: 0.6;">
            支持单次模拟、策略锦标赛、A/B 对比实验
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const API_BASE = 'http://localhost:8000';
let backendConnected = false;

// 页面加载时检测后端
window.onload = async function() {
  await checkBackend();
};

async function checkBackend() {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  const engine = document.getElementById('engineVersion');

  try {
    const res = await fetch(`${API_BASE}/health`, { method: 'GET' });
    const data = await res.json();

    if (data.status === 'ok') {
      backendConnected = true;
      dot.classList.add('connected');
      text.textContent = '后端已连接 ✅';
      engine.textContent = data.version || 'v4.0';
      enableButtons(true);
    } else {
      throw new Error(' unhealthy');
    }
  } catch (e) {
    backendConnected = false;
    text.textContent = '后端未连接 ❌ (请确认 python echo_simulator_api_v2.py 已运行)';
    engine.textContent = '-';
    enableButtons(false);
  }
}

function enableButtons(enabled) {
  ['btnSingle', 'btnTournament', 'btnAB'].forEach(id => {
    const btn = document.getElementById(id);
    if (btn) btn.disabled = !enabled;
  });
}

function switchTab(tab) {
  document.querySelectorAll('.endpoint-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));

  event.target.classList.add('active');
  document.getElementById(`tab-${tab}`).classList.add('active');
}

function showLoading(msg) {
  document.getElementById('emptyCard').style.display = 'none';
  document.getElementById('resultCard').style.display = 'block';
  document.getElementById('resultContent').innerHTML =
    `<div class="loading"><span class="loading-spinner"></span>${msg}</div>`;
}

function showError(msg) {
  document.getElementById('resultContent').innerHTML =
    `<div class="error-box">❌ ${msg}</div>`;
}

function showSuccess(msg) {
  document.getElementById('resultContent').innerHTML =
    `<div class="success-box">✅ ${msg}</div>`;
}

function formatJSON(obj) {
  const str = JSON.stringify(obj, null, 2);
  return str.replace(/"([^"]+)":/g, '<span class="json-key">"$1":</span>')
            .replace(/: "([^"]*)"/g, ': <span class="json-string">"$1"</span>')
            .replace(/: ([\d.]+)/g, ': <span class="json-number">$1</span>')
            .replace(/: (true|false)/g, ': <span class="json-bool">$1</span>');
}

function updateQuickMetrics(summary) {
  document.getElementById('qEvents').textContent = summary.total_events || '-';
  document.getElementById('qRevenue').textContent = summary.total_revenue ? summary.total_revenue.toFixed(1) : '-';
  document.getElementById('qSatisfaction').textContent = summary.creator_satisfaction ? summary.creator_satisfaction.toFixed(1) : '-';
  document.getElementById('qHealth').textContent = summary.ecosystem_health !== undefined ? summary.ecosystem_health.toFixed(2) : '-';
}

async function runSingle() {
  if (!backendConnected) { showError('后端未连接'); return; }

  const days = parseInt(document.getElementById('durationDays').value);
  const creators = parseInt(document.getElementById('numCreators').value);
  const users = parseInt(document.getElementById('numUsers').value);
  const fee = parseInt(document.getElementById('platformFee').value);

  showLoading('正在运行单次模拟，请稍候...');

  try {
    const res = await fetch(`${API_BASE}/run`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        simulation_config: { duration_days: days, num_creators: creators, num_users: users },
        environment_params: { platform_fee_percent: fee }
      })
    });

    const data = await res.json();

    if (!res.ok) throw new Error(data.detail?.[0]?.msg || '请求失败');

    updateQuickMetrics(data.summary || {});

    let html = '';
    html += `<div class="success-box">✅ 模拟完成！Run ID: ${data.run_id}</div>`;

    // 创作者排行
    if (data.creator_results) {
      html += `<h3 style="margin: 16px 0 8px; color: var(--ink-medium);">🏆 创作者收入排行</h3>`;
      html += `<div class="creator-list">`;
      const sorted = [...data.creator_results].sort((a, b) => b.total_revenue - a.total_revenue);
      sorted.forEach((c, i) => {
        const rankClass = i < 3 ? `rank-${i+1}` : '';
        html += `<div class="creator-item">
          <span class="${rankClass}">${i+1}. ${c.name} 《${c.asset_lifecycle?.title || '作品'}》</span>
          <span class="${rankClass}">${c.total_revenue.toFixed(1)}</span>
        </div>`;
      });
      html += `</div>`;
    }

    // 完整 JSON
    html += `<h3 style="margin: 16px 0 8px; color: var(--ink-medium);">📄 完整数据</h3>`;
    html += `<div class="json-viewer">${formatJSON(data)}</div>`;

    document.getElementById('resultContent').innerHTML = html;
  } catch (e) {
    showError(e.message);
  }
}

async function runTournament() {
  if (!backendConnected) { showError('后端未连接'); return; }

  const select = document.getElementById('strategies');
  const strategies = Array.from(select.selectedOptions).map(o => o.value);
  if (strategies.length < 2) { showError('请至少选择2种策略对比'); return; }

  const days = parseInt(document.getElementById('durationDays').value);
  const creators = parseInt(document.getElementById('numCreators').value);
  const users = parseInt(document.getElementById('numUsers').value);
  const fee = parseInt(document.getElementById('platformFee').value);
  const rounds = parseInt(document.getElementById('nRounds').value);

  showLoading(`正在运行锦标赛 (${strategies.join(' vs ')})，${rounds}轮...`);

  try {
    const res = await fetch(`${API_BASE}/run/tournament`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        simulation_config: { duration_days: days, num_creators: creators, num_users: users },
        environment_params: { platform_fee_percent: fee },
        strategies: strategies,
        n_rounds: rounds
      })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.detail?.[0]?.msg || '请求失败');

    updateQuickMetrics(data.summary || {});

    let html = `<div class="success-box">✅ 锦标赛完成！${rounds}轮，${strategies.length}种策略</div>`;

    // 排名
    if (data.ranking) {
      html += `<h3 style="margin: 16px 0 8px; color: var(--ink-medium);">🏆 策略排名</h3>`;
      html += `<div class="creator-list">`;
      data.ranking.forEach((r, i) => {
        const rankClass = i < 3 ? `rank-${i+1}` : '';
        html += `<div class="creator-item">
          <span class="${rankClass}">${i+1}. ${r.strategy}</span>
          <span class="${rankClass}">胜 ${r.win_count}/${r.total_rounds} · 均收 ${r.avg_revenue?.toFixed(1) || '-'}</span>
        </div>`;
      });
      html += `</div>`;
    }

    // 统计显著性
    if (data.statistical_significance) {
      const sig = data.statistical_significance;
      html += `<h3 style="margin: 16px 0 8px; color: var(--ink-medium);">📊 统计检验</h3>`;
      html += `<div class="json-viewer">${formatJSON(sig)}</div>`;
    }

    // 完整数据
    html += `<h3 style="margin: 16px 0 8px; color: var(--ink-medium);">📄 完整数据</h3>`;
    html += `<div class="json-viewer">${formatJSON(data)}</div>`;

    document.getElementById('resultContent').innerHTML = html;
  } catch (e) {
    showError(e.message);
  }
}

async function runAB() {
  if (!backendConnected) { showError('后端未连接'); return; }

  const days = parseInt(document.getElementById('durationDays').value);
  const creators = parseInt(document.getElementById('numCreators').value);
  const users = parseInt(document.getElementById('numUsers').value);
  const fee = parseInt(document.getElementById('platformFee').value);
  const rounds = parseInt(document.getElementById('nRoundsAB').value);

  showLoading(`正在运行 A/B 实验 (ECHO vs 传统平台)，${rounds}轮...`);

  try {
    const res = await fetch(`${API_BASE}/run/ab`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        simulation_config: { duration_days: days, num_creators: creators, num_users: users },
        environment_params: { platform_fee_percent: fee },
        n_rounds: rounds
      })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.detail?.[0]?.msg || '请求失败');

    updateQuickMetrics(data.summary || {});

    let html = `<div class="success-box">✅ A/B 实验完成！${rounds}轮对比</div>`;

    // 对比结果
    if (data.comparison) {
      html += `<h3 style="margin: 16px 0 8px; color: var(--ink-medium);">⚖️ 对比结果</h3>`;
      html += `<div class="json-viewer">${formatJSON(data.comparison)}</div>`;
    }

    // ECHO 组
    if (data.echo_group) {
      html += `<h3 style="margin: 16px 0 8px; color: var(--ink-medium);">🌱 ECHO 平台</h3>`;
      html += `<div class="json-viewer">${formatJSON(data.echo_group)}</div>`;
    }

    // 对照组
    if (data.control_group) {
      html += `<h3 style="margin: 16px 0 8px; color: var(--ink-medium);">🏭 传统平台</h3>`;
      html += `<div class="json-viewer">${formatJSON(data.control_group)}</div>`;
    }

    // 完整数据
    html += `<h3 style="margin: 16px 0 8px; color: var(--ink-medium);">📄 完整数据</h3>`;
    html += `<div class="json-viewer">${formatJSON(data)}</div>`;

    document.getElementById('resultContent').innerHTML = html;
  } catch (e) {
    showError(e.message);
  }
}

// 每30秒检测一次后端状态
setInterval(checkBackend, 30000);
</script>
</body>
</html>
