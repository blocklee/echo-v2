        function initApp() {
            // Check backend first
            checkBackendHealth();

            // Filter pills
            document.querySelectorAll('.filter-pill').forEach(p => {
                p.addEventListener('click', () => {
                    document.querySelectorAll('.filter-pill').forEach(x => x.classList.remove('active'));
                    p.classList.add('active');
                    currentFilter = p.dataset.filter;
                    renderEvents();
                });
            });

            // Speed buttons
            document.querySelectorAll('.speed-btn').forEach(b => {
                b.addEventListener('click', () => {
                    document.querySelectorAll('.speed-btn').forEach(x => x.classList.remove('active'));
                    b.classList.add('active');
                    playSpeed = parseInt(b.dataset.speed);
                });
            });

            // Slider
            const slider = document.getElementById('day-slider');
            slider.addEventListener('input', () => {
                pause();
                goToDay(parseInt(slider.value));
            });

            // Play/Pause
            document.getElementById('btn-play').addEventListener('click', togglePlay);
            document.getElementById('btn-prev').addEventListener('click', () => { pause(); goToDay(Math.max(1, currentDay - 1)); });
            document.getElementById('btn-next').addEventListener('click', () => { pause(); goToDay(Math.min(simData?.snapshots?.length || 30, currentDay + 1)); });

            // Custom creators panel
            document.getElementById('btn-toggle-custom').addEventListener('click', () => {
                const panel = document.getElementById('custom-creators-panel');
                const chevron = document.getElementById('custom-chevron');
                if (panel.style.display === 'none') {
                    panel.style.display = 'block';
                    chevron.textContent = '▼';
                    renderCustomTable();
                } else {
                    panel.style.display = 'none';
                    chevron.textContent = '▶';
                }
            });

            // Auto-update custom table when nCreators changes
            document.getElementById('cfg-creators').addEventListener('change', () => {
                if (document.getElementById('custom-creators-panel').style.display !== 'none') {
                    renderCustomTable();
                }
            });
        }

        // ─── Custom Creators Panel ───
        function renderCustomTable() {
            const n = parseInt(document.getElementById('cfg-creators').value) || 6;
            const defaultNames = ['王小明','苏珊','共创小组','林小墨','阿Ken','陈默'];
            const defaultDomains = ['开发','文学','设计','设计','音乐','摄影'];
            const container = document.getElementById('custom-creators-table');

            let html = '<table style="width:100%;border-collapse:collapse;font-size:0.8rem;"><thead><tr style="background:rgba(74,124,111,0.08);">';
            html += '<th style="padding:6px 8px;text-align:left;width:40px;">#</th>';
            html += '<th style="padding:6px 8px;text-align:left;">名字</th>';
            html += '<th style="padding:6px 8px;text-align:left;">领域</th>';
            html += '<th style="padding:6px 8px;text-align:left;">策略</th>';
            html += '</tr></thead><tbody>';

            for (let i = 0; i < n; i++) {
                html += `<tr style="border-bottom:1px solid var(--border-light);">`;
                html += `<td style="padding:6px 8px;color:var(--ink-faint);">${i+1}</td>`;
                html += `<td style="padding:4px 8px;"><input type="text" class="cc-name" data-idx="${i}" value="${defaultNames[i]||''}" placeholder="创作者${i+1}" style="width:100%;padding:3px 6px;border:1px solid var(--border-light);border-radius:4px;font-size:0.75rem;font-family:inherit;background:var(--paper);"></td>`;
                html += `<td style="padding:4px 8px;"><select class="cc-domain" data-idx="${i}" style="padding:3px 6px;border:1px solid var(--border-light);border-radius:4px;font-size:0.75rem;font-family:inherit;background:var(--paper);">`;
                ['开发','文学','设计','音乐','摄影','通用'].forEach(d => {
                    const sel = d === (defaultDomains[i]||'通用') ? 'selected' : '';
                    html += `<option value="${d}" ${sel}>${d}</option>`;
                });
                html += `</select></td>`;
                html += `<td style="padding:4px 8px;"><select class="cc-strategy" data-idx="${i}" style="padding:3px 6px;border:1px solid var(--border-light);border-radius:4px;font-size:0.75rem;font-family:inherit;background:var(--paper);">`;
                const strategies = [['','（继承全局）'],['open','开放型'],['balanced','平衡型'],['conservative','保守型'],['strategic','策略型']];
                strategies.forEach(([val,label]) => {
                    html += `<option value="${val}">${label}</option>`;
                });
                html += `</select></td>`;
                html += `</tr>`;
            }
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function getCustomCreators() {
            const names = document.querySelectorAll('.cc-name');
            const domains = document.querySelectorAll('.cc-domain');
            const strategies = document.querySelectorAll('.cc-strategy');
            const creators = [];
            names.forEach((el, i) => {
                const name = el.value.trim();
                const domain = domains[i]?.value;
                const strategy = strategies[i]?.value;
                if (name || domain || strategy) {
                    creators.push({ name: name || undefined, domain: domain || undefined, strategy: strategy || undefined });
                }
            });
            return creators.length > 0 ? creators : undefined;
        }

        // ─── Playback ───
        function togglePlay() {
            if (isPlaying) { pause(); }
            else { play(); }
        }

        function play() {
            if (!simData || !simData.snapshots) return;
            isPlaying = true;
            document.getElementById('btn-play').textContent = '⏸';
            if (currentDay >= simData.snapshots.length) {
                currentDay = 1;
            }
            tick();
        }

        function pause() {
            isPlaying = false;
            document.getElementById('btn-play').textContent = '▶';
            if (playTimer) clearTimeout(playTimer);
        }

        function tick() {
            if (!isPlaying) return;
            const maxDay = simData.snapshots.length;
            if (currentDay >= maxDay) {
                pause();
                return;
            }
            currentDay++;
            goToDay(currentDay);
            playTimer = setTimeout(tick, playSpeed);
        }

        function goToDay(day) {
            currentDay = day;
            document.getElementById('current-day').textContent = day;
            document.getElementById('day-slider').value = day;
            renderDay();
        }

        // ─── Run Simulation ───
        async function runSimulation() {
            if (isRunning) return;
            isRunning = true;

            const cfg = {
                nCreators: parseInt(document.getElementById('cfg-creators').value) || 6,
                nUsers: parseInt(document.getElementById('cfg-users').value) || 20,
                durationDays: parseInt(document.getElementById('cfg-days').value) || 30,
                strategy: document.getElementById('cfg-strategy').value || null,
                seed: parseInt(document.getElementById('cfg-seed').value) || 42,
            };

            // Add custom creators if panel is open and filled
            const custom = getCustomCreators();
            if (custom) cfg.customCreators = custom;

            // Build API payload (snake_case for backend)
            const apiBody = {
                n_creators: cfg.nCreators,
                n_users: cfg.nUsers,
                duration_days: cfg.durationDays,
                echo_enabled: true,
                seed: cfg.seed,
                strategy: cfg.strategy,
            };
            if (custom && custom.length > 0) {
                apiBody.custom_creators = custom.map(c => ({
                    name: c.name,
                    domain: c.domain,
                    strategy: c.strategy || cfg.strategy,
                }));
            }

            // Try backend first
            if (backendChecked && backendAvailable) {
                showLoading('后端模拟计算中...', `${cfg.nCreators} 创作者 · ${cfg.nUsers} 使用者 · ${cfg.durationDays} 天`);
                // Simulate progress animation
                let progress = 0;
                const progressInterval = setInterval(() => {
                    progress += Math.random() * 8;
                    if (progress > 85) progress = 85;
                    setProgress(progress);
                }, 500);

                try {
                    const controller = new AbortController();
                    const timeoutMs = Math.max(30000, cfg.durationDays * cfg.nUsers * 20);
                    const timeoutId = setTimeout(() => controller.abort(), timeoutMs);

                    const response = await fetch(`${API_BASE}/run`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(apiBody),
                        signal: controller.signal,
                    });
                    clearTimeout(timeoutId);

                    if (!response.ok) {
                        throw new Error(`后端返回 HTTP ${response.status}`);
                    }

                    const data = await response.json();
                    clearInterval(progressInterval);
                    setProgress(100);

                    if (!data.success || !data.results) {
                        throw new Error('后端返回数据格式异常: 缺少 success/results 字段');
                    }

                    simData = data.results;
                    console.log('✅ 后端模拟完成:', {
                        events: simData.events?.length,
                        snapshots: simData.snapshots?.length,
                        creators: simData.creators?.length,
                        users: simData.users?.length,
                    });
                    showToast('✅ 后端模拟完成', 'info');

                    hideLoading();
                    finalizeRun(cfg);
                    isRunning = false;
                    return;
                } catch (apiErr) {
                    clearInterval(progressInterval);
                    hideLoading();
                    console.warn('后端调用失败，降级到本地引擎:', apiErr.message);
                    showToast(`⚠️ 后端不可用 (${apiErr.message})，使用本地引擎`, 'warn');
                    backendAvailable = false;
                    // Fall through to local engine
                }
            }

            // ─── Local JS Fallback ───
            showLoading('本地引擎运行中...', '前端 JavaScript 计算');
            setProgress(10);
            await new Promise(r => setTimeout(r, 100)); // let UI update

            try {
                if (typeof EchoModel === 'undefined') {
                    throw new Error('本地引擎 (echo_simulation.js) 未加载');
                }
                const model = new EchoModel(cfg);
                setProgress(30);
                simData = model.run();
                setProgress(100);
                showToast('✅ 本地模拟完成', 'info');
            } catch (localErr) {
                hideLoading();
                showToast(`❌ 本地引擎也失败了: ${localErr.message}`, 'warn');
                console.error('本地引擎错误:', localErr);
                isRunning = false;
                return;
            }

            hideLoading();
            finalizeRun(cfg);
            isRunning = false;
        }

        function finalizeRun(cfg) {
            if (!simData) return;
            document.getElementById('total-days').textContent = '/ ' + cfg.durationDays;
            document.getElementById('day-slider').max = cfg.durationDays;
            document.getElementById('day-slider').value = 1;
            currentDay = 1;
            document.getElementById('current-day').textContent = '1';
            renderDay();
            renderDailyChart();
            renderTrendChart();
        }

        // ─── Render Day ───
        function renderDay() {
            if (!simData || !simData.snapshots) return;
            const snapshot = simData.snapshots[currentDay - 1];
            if (!snapshot) return;

            renderEvents();
            renderNetwork(snapshot);
            renderRankings(snapshot);
            renderUsers(snapshot);
            updateMetrics(snapshot);
            updateFilterCounts();
        }

        // ─── Events ───
        function renderEvents() {
            const container = document.getElementById('events-body');
            if (!simData || !simData.snapshots) {
                container.innerHTML = '<div class="events-empty">暂无事件</div>';
                return;
            }

            const snapshot = simData.snapshots[currentDay - 1];
            const dayEvents = snapshot.events || [];

            const filtered = currentFilter === 'all'
                ? dayEvents
                : dayEvents.filter(e => e.type === currentFilter);

            // Count display
            const totalToday = dayEvents.length;
            document.getElementById('events-count').textContent = `${filtered.length} / ${totalToday} 个`;

            if (!filtered.length) {
                container.innerHTML = '<div class="events-empty">第 ' + currentDay + ' 天暂无该类型事件</div>';
                return;
            }

            const summaryText = totalToday > 0
                ? `<div class="day-summary">第 <strong>${currentDay}</strong> 天共 <strong>${totalToday}</strong> 个事件</div>`
                : '';

            container.innerHTML = summaryText + filtered.map(e => renderEventItem(e)).join('');
        }

        function renderEventItem(e) {
            const toName = getActorName(e.to);
            const fromName = getActorName(e.from);
            const label = EVENT_LABELS[e.type] || e.type;
            const amount = e.amount > 0 ? `<span class="event-amount">+${e.amount.toFixed(2)}</span>` : '';
            const reason = e.details?.reason ? `<span style="font-size:0.7rem;color:var(--ink-faint);margin-left:6px;" title="Agent决策">💭 ${e.details.reason}</span>` : '';
            
            // create 事件特殊显示：to 是新资产，显示源资产信息
            let toDisplay = toName;
            let arrowDisplay = '→';
            if (e.type === 'create') {
                toDisplay = '新资产';
                arrowDisplay = '✨';
            }

            return `
                <div class="event-item">
                    <span class="event-tag tag-${e.type}">${label}</span>
                    <span class="event-actor">${fromName}</span>
                    <span class="event-arrow">${arrowDisplay}</span>
                    <span class="event-actor">${toDisplay}</span>
                    ${amount}
                    ${reason}
                </div>
            `;
        }

        function getActorName(id) {
            if (!simData) return id || '?';
            const c = simData.creators.find(c => c.id === id);
            if (c) return c.name;
            const u = simData.users.find(u => u.id === id);
            if (u) return u.name || u.id;
            return id || '系统';
        }

        function updateFilterCounts() {
            if (!simData || !simData.snapshots) return;
            // Count all events across all days for reference
            const counts = {};
            simData.snapshots.forEach(s => {
                (s.events || []).forEach(e => { counts[e.type] = (counts[e.type] || 0) + 1; });
            });
            document.querySelectorAll('.filter-pill:not(.all)').forEach(p => {
                const type = p.dataset.filter;
                const c = counts[type] || 0;
                const existing = p.querySelector('.count');
                if (existing) existing.textContent = c;
                else p.innerHTML += `<span class="count">${c}</span>`;
            });
        }

        // ─── Network ───
        function renderNetwork(snapshot) {
            const container = document.getElementById('network-viz');
            const svgOld = container.querySelector('svg');
            if (svgOld) svgOld.remove();

            const width = container.clientWidth;
            const height = container.clientHeight;
            if (!width || !height) return;

            const svg = d3.select('#network-viz').append('svg')
                .attr('width', width).attr('height', height);

            const creators = snapshot.creatorStates || [];
            const users = simData.users || [];

            // Nodes
            const nodes = [
                ...creators.map((c, i) => ({
                    id: c.id, name: c.name, type: 'creator',
                    shi: c.shiLevel || 0, revenue: c.revenue || 0,
                    x: width / 2 + (Math.random() - 0.5) * 200,
                    y: height / 2 + (Math.random() - 0.5) * 200
                })),
                ...users.map(u => ({
                    id: u.id, name: u.name || u.id, type: 'user',
                    x: width / 2 + (Math.random() - 0.5) * 300,
                    y: height / 2 + (Math.random() - 0.5) * 300
                }))
            ];

            // Edges from snapshot relationships (only those created by this day)
            const edges = [];
            creators.forEach(c => {
                (c.relationships || []).forEach(r => {
                    if (nodes.find(n => n.id === r.target)) {
                        edges.push({ source: c.id, target: r.target, type: r.type || 'cite', weight: r.weight || 1 });
                    }
                });
            });

            const sim = d3.forceSimulation(nodes)
                .force('link', d3.forceLink(edges).id(d => d.id).distance(100))
                .force('charge', d3.forceManyBody().strength(d => d.type === 'user' ? -80 : -400))
                .force('center', d3.forceCenter(width / 2, height / 2))
                .force('collision', d3.forceCollide().radius(d => d.type === 'user' ? 8 : 25));

            const link = svg.append('g').selectAll('line').data(edges).enter().append('line')
                .attr('stroke', d => EVENT_COLORS[d.type] || '#999')
                .attr('stroke-opacity', 0.4)
                .attr('stroke-width', d => Math.sqrt(d.weight));

            const node = svg.append('g').selectAll('g').data(nodes).enter().append('g')
                .call(d3.drag()
                    .on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
                    .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
                    .on('end', (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }));

            node.each(function(d) {
                const g = d3.select(this);
                if (d.type === 'user') {
                    g.append('circle').attr('r', 5).attr('fill', '#bbb').attr('opacity', 0.6);
                } else {
                    const r = 12 + Math.min(d.revenue * 0.8, 20);
                    g.append('circle').attr('r', r)
                        .attr('fill', SHI_COLORS[d.shi] || SHI_COLORS[0])
                        .attr('stroke', '#fff').attr('stroke-width', 2);
                    g.append('text').attr('dy', 4).attr('text-anchor', 'middle')
                        .attr('fill', d.shi >= 2 ? '#fff' : '#333')
                        .attr('font-size', '10px').attr('font-weight', 'bold')
                        .text(`L${d.shi}`);
                }
            });

            node.append('text').attr('dy', d => d.type === 'user' ? -10 : -20)
                .attr('text-anchor', 'middle').attr('font-size', d => d.type === 'user' ? '8px' : '11px')
                .attr('fill', '#444').text(d => d.name);

            sim.on('tick', () => {
                link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
                    .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
                node.attr('transform', d => `translate(${d.x},${d.y})`);
            });
        }

        // ─── Rankings ───
        function renderRankings(snapshot) {
            const container = document.getElementById('rank-body');
            if (!snapshot) return;
            const creators = snapshot.creatorStates || [];
            const sorted = [...creators].sort((a, b) => (b.revenue || 0) - (a.revenue || 0));

            container.innerHTML = sorted.map((c, i) => {
                const shi = c.shiLevel || 0;
                return `
                    <div class="rank-row">
                        <div class="rank-idx ${i < 3 ? 'top' : ''}">${i + 1}</div>
                        <div class="rank-dot" style="background:${SHI_COLORS[shi] || SHI_COLORS[0]}"></div>
                        <div class="rank-info">
                            <div class="rank-name">${c.name}</div>
                            <div class="rank-meta">${c.domain} · 满意度 ${(c.satisfaction || 0).toFixed(1)} · L${shi}</div>
                        </div>
                        <div class="rank-value">${(c.revenue || 0).toFixed(1)}</div>
                    </div>
                `;
            }).join('');
        }

        function renderUsers(snapshot) {
            const container = document.getElementById('user-body');
            if (!snapshot || !snapshot.userStates) {
                container.innerHTML = '<div class="events-empty" style="padding:12px;">等待运行...</div>';
                return;
            }

            const users = snapshot.userStates;
            if (users.length === 0) {
                container.innerHTML = '<div class="events-empty" style="padding:12px;">无使用者</div>';
                return;
            }

            const TYPE_LABELS = { browser: '浏览', citer: '引用', remixer: '改编', spreader: '传播', payer: '付费', disputer: '争议' };
            const TYPE_COLORS = { browser: '#7a8b82', citer: '#1565c0', remixer: '#e65100', spreader: '#00695c', payer: '#6a1b9a', disputer: '#c62828' };

            container.innerHTML = users.map(u => {
                const typeLabel = TYPE_LABELS[u.userType] || u.userType;
                const typeColor = TYPE_COLORS[u.userType] || '#7a8b82';
                const moodColor = u.mood > 0.3 ? '#4A7C6F' : u.mood < -0.3 ? '#c44536' : '#a0b0a8';
                const activeText = u.active ? '' : '<span style="font-size:0.65rem;color:#c44536;">[退出]</span>';
                const rejectBadge = (u.memory?.totalRejections || 0) > 0
                    ? `<span style="color:#c44536;font-size:0.65rem;">❌${u.memory.totalRejections}</span>`
                    : '';

                return `
                    <div style="padding:8px 12px;border-bottom:1px solid rgba(44,62,58,0.06);font-size:0.8rem;cursor:pointer;"
                         title="${u.name} · 领域:${u.domain}"
                         onmouseover="this.style.background='rgba(74,124,111,0.04)" onmouseout="this.style.background=''">
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <span style="font-weight:500;">${u.name}</span>
                            <span style="font-size:0.7rem;color:${typeColor};font-weight:500;">${typeLabel}</span>
                        </div>
                        <div style="display:flex;gap:10px;margin-top:3px;font-size:0.7rem;color:var(--ink-light);">
                            <span>💰 ${(u.wallet || 0).toFixed(1)}</span>
                            <span style="color:${moodColor};">😊 ${(u.mood || 0).toFixed(1)}</span>
                            <span>📊 ${(u.memory?.totalEvents || 0)}</span>
                            ${rejectBadge}
                            ${activeText}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ─── Metrics ───
        function updateMetrics(snapshot) {
            if (!snapshot) return;
            const m = snapshot.metrics || {};
            document.getElementById('m-events').textContent = m.totalEvents || 0;
            document.getElementById('m-revenue').textContent = (m.totalRevenue || 0).toFixed(1);
            document.getElementById('m-density').textContent = (m.networkDensity || 0).toFixed(3);
        }

        // ─── Daily Events Chart (stacked bar, cumulative) ───
        function renderDailyChart() {
            const container = document.getElementById('daily-chart');
            container.innerHTML = '';
            if (!simData || !simData.snapshots) return;

            const w = container.clientWidth;
            const h = container.clientHeight;
            const margin = { top: 10, right: 10, bottom: 30, left: 30 };
            const cw = w - margin.left - margin.right;
            const ch = h - margin.top - margin.bottom;

            const days = d3.range(1, simData.snapshots.length + 1);
            const types = ['browse', 'cite', 'remix', 'pay', 'spread', 'dispute', 'create'];

            // Count events per day per type
            const data = days.map(day => {
                const d = { day };
                types.forEach(t => { d[t] = 0; });
                const snapshot = simData.snapshots[day - 1];
                (snapshot.events || []).forEach(e => {
                    if (d[e.type] !== undefined) d[e.type]++;
                });
                return d;
            });

            const svg = d3.select('#daily-chart').append('svg').attr('width', w).attr('height', h);
            const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

            const x = d3.scaleBand().domain(days).range([0, cw]).padding(0.3);
            const y = d3.scaleLinear()
                .domain([0, d3.max(data, d => types.reduce((s, t) => s + d[t], 0)) || 1])
                .range([ch, 0]);

            const stack = d3.stack().keys(types);
            const series = stack(data);

            g.selectAll('.series').data(series).enter().append('g')
                .attr('fill', d => EVENT_COLORS[d.key])
                .selectAll('rect').data(d => d).enter().append('rect')
                .attr('x', d => x(d.data.day))
                .attr('y', d => y(d[1]))
                .attr('height', d => y(d[0]) - y(d[1]))
                .attr('width', x.bandwidth())
                .attr('opacity', 0.85);

            g.append('g').attr('transform', `translate(0,${ch})`)
                .call(d3.axisBottom(x).tickValues(days.filter((d, i) => i % 5 === 0 || i === days.length - 1)).tickFormat(d => d + '天'))
                .attr('font-size', '10px').attr('color', '#999');

            g.append('g').call(d3.axisLeft(y).ticks(4)).attr('font-size', '10px').attr('color', '#999');
        }

        // ─── Trend Chart ───
        function renderTrendChart() {
            const container = document.getElementById('trend-chart');
            container.innerHTML = '';
            if (!simData || !simData.snapshots) return;

            const w = container.clientWidth;
            const h = container.clientHeight;
            const margin = { top: 10, right: 10, bottom: 30, left: 30 };
            const cw = w - margin.left - margin.right;
            const ch = h - margin.top - margin.bottom;

            const svg = d3.select('#trend-chart').append('svg').attr('width', w).attr('height', h);
            const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

            const days = simData.snapshots.map((s, i) => i + 1);
            const nCreators = simData.snapshots[0].creatorStates.length;

            const x = d3.scaleLinear().domain([1, days.length]).range([0, cw]);
            const y = d3.scaleLinear().domain([0, 3.5]).range([ch, 0]);

            // For each creator, build array of shi levels per day
            for (let ci = 0; ci < nCreators; ci++) {
                const shiPerDay = simData.snapshots.map(s => (s.creatorStates[ci].shiLevel || 0));
                const line = d3.line().x((d, i) => x(i + 1)).y(d => y(d));
                g.append('path').datum(shiPerDay)
                    .attr('fill', 'none')
                    .attr('stroke', SHI_COLORS[ci % SHI_COLORS.length])
                    .attr('stroke-width', 2)
                    .attr('d', line);
            }

            g.append('g').attr('transform', `translate(0,${ch})`)
                .call(d3.axisBottom(x).ticks(Math.min(days.length, 5)).tickFormat(d => d + '天'))
                .attr('font-size', '10px').attr('color', '#999');
            g.append('g').call(d3.axisLeft(y).ticks(4).tickFormat(d => 'L' + Math.floor(d)))
                .attr('font-size', '10px').attr('color', '#999');
        }

        // ─── Tournament ───
        async function runTournament() {
            if (isRunning) return;
            isRunning = true;

            const cfg = {
                n_creators: parseInt(document.getElementById('cfg-creators').value) || 6,
                n_users: parseInt(document.getElementById('cfg-users').value) || 20,
                duration_days: parseInt(document.getElementById('cfg-days').value) || 30,
                n_rounds: 10,
                strategies: ["conservative", "open", "balanced", "strategic"],
            };

            if (backendChecked && backendAvailable) {
                showLoading('锦标赛计算中...', '多策略对比 · 10 轮模拟');
                let progress = 0;
                const progressInterval = setInterval(() => {
                    progress += Math.random() * 6;
                    if (progress > 85) progress = 85;
                    setProgress(progress);
                }, 600);

                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 60000);

                    const response = await fetch(`${API_BASE}/run/tournament`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(cfg),
                        signal: controller.signal,
                    });
                    clearTimeout(timeoutId);

                    if (!response.ok) throw new Error(`后端 ${response.status}`);
                    const data = await response.json();
                    clearInterval(progressInterval);
                    setProgress(100);

                    if (!data.success) throw new Error('后端返回异常');

                    const adapted = { results: {} };
                    for (const [key, val] of Object.entries(data.results)) {
                        adapted.results[key] = {
                            name: val.name || key,
                            avgRevenue: val.avg_revenue,
                            avgSatisfaction: val.avg_satisfaction,
                            avgNetworkDensity: val.avg_network_density,
                            avgEvents: val.avg_events,
                        };
                    }
                    hideLoading();
                    showExpPanel('🏆 配置策略锦标赛（后端真实模拟）', renderTournamentHTML(adapted));
                    showToast('✅ 锦标赛完成', 'info');
                    isRunning = false;
                    return;
                } catch (e) {
                    clearInterval(progressInterval);
                    hideLoading();
                    console.warn('后端锦标赛失败，降级到本地:', e.message);
                    showToast(`⚠️ 后端不可用 (${e.message})，使用本地演示`, 'warn');
                    backendAvailable = false;
                }
            }

            // ─── Local JS Fallback ───
            showLoading('本地锦标赛计算中...', '前端演示模式');
            setProgress(20);
            await new Promise(r => setTimeout(r, 100));

            try {
                if (typeof runTournamentJS === 'undefined') {
                    throw new Error('本地锦标赛引擎未加载');
                }
                const localCfg = {
                    nCreators: cfg.n_creators,
                    nUsers: cfg.n_users,
                    durationDays: cfg.duration_days,
                    nRounds: cfg.n_rounds,
                };
                const data = runTournamentJS(localCfg);
                setProgress(100);
                hideLoading();
                showExpPanel('🏆 配置策略锦标赛（本地演示）', renderTournamentHTML(data));
                showToast('✅ 本地锦标赛完成', 'info');
            } catch (localErr) {
                hideLoading();
                showToast(`❌ 本地锦标赛失败: ${localErr.message}`, 'warn');
                console.error('本地锦标赛错误:', localErr);
            }

            isRunning = false;
        }

        function renderTournamentHTML(data) {
            const results = data.results;
            const sorted = Object.entries(results).sort((a, b) => b[1].avgRevenue - a[1].avgRevenue);
            return `
                <table style="width:100%;border-collapse:collapse;font-size:0.85rem;">
                    <tr style="background:rgba(74,124,111,0.1);">
                        <th style="padding:8px;text-align:left;">策略</th>
                        <th style="padding:8px;text-align:right;">平均收入</th>
                        <th style="padding:8px;text-align:right;">满意度</th>
                        <th style="padding:8px;text-align:center;">推荐</th>
                    </tr>
                    ${sorted.map(([key, s], i) => `
                        <tr style="border-bottom:1px solid rgba(44,62,58,0.08);">
                            <td style="padding:8px;"><strong>${s.name}</strong></td>
                            <td style="padding:8px;text-align:right;">${s.avgRevenue.toFixed(2)}</td>
                            <td style="padding:8px;text-align:right;">${s.avgSatisfaction.toFixed(2)}</td>
                            <td style="padding:8px;text-align:center;">${i === 0 ? '⭐' : ''}</td>
                        </tr>
                    `).join('')}
                </table>
                <p style="margin-top:12px;color:var(--ink-light);font-size:0.8rem;">${sorted[0][1].name} 策略收入最高</p>
            `;
        }

        // ─── A/B Test ───
        async function runABTest() {
            if (isRunning) return;
            isRunning = true;

            const cfg = {
                n_creators: parseInt(document.getElementById('cfg-creators').value) || 6,
                n_users: parseInt(document.getElementById('cfg-users').value) || 20,
                duration_days: parseInt(document.getElementById('cfg-days').value) || 30,
                n_rounds: 10,
            };

            if (backendChecked && backendAvailable) {
                showLoading('A/B 实验计算中...', 'ECHO vs 传统平台 · 10 轮对比');
                let progress = 0;
                const progressInterval = setInterval(() => {
                    progress += Math.random() * 6;
                    if (progress > 85) progress = 85;
                    setProgress(progress);
                }, 600);

                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 60000);

                    const response = await fetch(`${API_BASE}/run/ab`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(cfg),
                        signal: controller.signal,
                    });
                    clearTimeout(timeoutId);

                    if (!response.ok) throw new Error(`后端 ${response.status}`);
                    const apiData = await response.json();
                    clearInterval(progressInterval);
                    setProgress(100);

                    if (!apiData.success) throw new Error('后端返回异常');

                    const adapted = {
                        echoGroup: {
                            meanRevenue: apiData.echo_group.mean_revenue,
                            stdRevenue: apiData.echo_group.std_revenue,
                        },
                        controlGroup: {
                            meanRevenue: apiData.control_group.mean_revenue,
                            stdRevenue: apiData.control_group.std_revenue,
                        },
                        comparison: {
                            revenueDiff: apiData.comparison.revenue_diff,
                            revenueDiffPct: apiData.comparison.revenue_diff_pct,
                        }
                    };
                    hideLoading();
                    showExpPanel('🔬 A/B 对照实验（后端真实模拟）', renderABHTML(adapted));
                    showToast('✅ A/B 实验完成', 'info');
                    isRunning = false;
                    return;
                } catch (e) {
                    clearInterval(progressInterval);
                    hideLoading();
                    console.warn('后端A/B失败，降级到本地:', e.message);
                    showToast(`⚠️ 后端不可用 (${e.message})，使用本地演示`, 'warn');
                    backendAvailable = false;
                }
            }

            // ─── Local JS Fallback ───
            showLoading('本地 A/B 计算中...', '前端演示模式');
            setProgress(20);
            await new Promise(r => setTimeout(r, 100));

            try {
                if (typeof runABExperimentJS === 'undefined') {
                    throw new Error('本地 A/B 引擎未加载');
                }
                const localCfg = {
                    nCreators: cfg.n_creators,
                    nUsers: cfg.n_users,
                    durationDays: cfg.duration_days,
                    nRounds: cfg.n_rounds,
                };
                const data = runABExperimentJS(localCfg);
                setProgress(100);
                hideLoading();
                showExpPanel('🔬 A/B 对照实验（本地演示）', renderABHTML(data));
                showToast('✅ 本地 A/B 完成', 'info');
            } catch (localErr) {
                hideLoading();
                showToast(`❌ 本地 A/B 失败: ${localErr.message}`, 'warn');
                console.error('本地 A/B 错误:', localErr);
            }

            isRunning = false;
        }

        function renderABHTML(data) {
            const echo = data.echoGroup;
            const control = data.controlGroup;
            const diff = data.comparison;
            return `
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
                    <div style="background:rgba(74,124,111,0.08);padding:16px;border-radius:8px;text-align:center;">
                        <div style="font-size:0.75rem;color:var(--ink-medium);margin-bottom:4px;">ECHO 组</div>
                        <div style="font-size:1.5rem;font-weight:600;color:var(--ink-medium);">${echo.meanRevenue.toFixed(1)}</div>
                        <div style="font-size:0.7rem;color:#999;">±${echo.stdRevenue.toFixed(1)}</div>
                    </div>
                    <div style="background:rgba(196,69,54,0.08);padding:16px;border-radius:8px;text-align:center;">
                        <div style="font-size:0.75rem;color:var(--vermilion);margin-bottom:4px;">对照组</div>
                        <div style="font-size:1.5rem;font-weight:600;color:var(--vermilion);">${control.meanRevenue.toFixed(1)}</div>
                        <div style="font-size:0.7rem;color:#999;">±${control.stdRevenue.toFixed(1)}</div>
                    </div>
                </div>
                <div style="background:rgba(74,124,111,0.1);padding:12px;border-radius:8px;font-size:0.85rem;">
                    ECHO 组比对照组 <strong>${diff.revenueDiff > 0 ? '高' : '低'} ${Math.abs(diff.revenueDiff).toFixed(2)}</strong>
                    （${diff.revenueDiffPct > 0 ? '+' : ''}${diff.revenueDiffPct}%）
                </div>
            `;
        }

        // ─── Helpers ───
        function setBtnLoading(id, loading, text) {
            const btn = document.getElementById(id);
            btn.disabled = loading;
            btn.textContent = text;
            btn.style.opacity = loading ? '0.7' : '1';
        }

        function showExpPanel(title, html) {
            document.getElementById('exp-title').textContent = title;
            document.getElementById('exp-content').innerHTML = html;
            document.getElementById('exp-panel').style.display = 'block';
            document.getElementById('exp-overlay').style.display = 'block';
        }

        function closeExpPanel() {
            document.getElementById('exp-panel').style.display = 'none';
            document.getElementById('exp-overlay').style.display = 'none';
        }

        // ─── Auto-run on load ───
        window.addEventListener('load', () => {
            initApp();
            runSimulation();
        });

        // Handle resize
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                if (simData) {
                    renderDay();
                    renderDailyChart();
                    renderTrendChart();
                }
            }, 200);
        });
    </script>
</body>
